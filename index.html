<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sara & Samuel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#faf8f5;
color:#333;
text-align:center;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486");
background-size:cover;
background-position:center;
color:white;
}

header h1{
font-family:"Playfair Display";
font-size:60px;
margin:0;
}

header h2{
font-weight:300;
}

section{
padding:80px 20px;
max-width:800px;
margin:auto;
}

.countdown{
font-size:28px;
margin-top:20px;
}

.timeline{
text-align:left;
max-width:400px;
margin:auto;
}

.timeline li{
margin:10px 0;
}

.map iframe{
width:100%;
height:350px;
border:0;
border-radius:10px;
}

footer{
padding:40px;
font-size:14px;
opacity:0.6;
}

button{
padding:15px 25px;
font-size:16px;
border:none;
background:#c8a97e;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<header>

<h1>un matrimonio garzontino</h1>
<div class="countdown" id="countdown"></div>

</header>

<section>

<p>
11 settembre 2026
</p>

</section>

<section>

<h2>Programma della giornata</h2>

<ul class="timeline">

<li><b>17:00</b> Cerimonia</li>
<li><b>18:00</b> Aperitivo</li>
<li><b>19:30</b> Cena</li>
<li><b>22:30</b> Festa</li>

</ul>

</section>

<section class="map">

<h2>Location</h2>

<iframe
src="https://www.google.com/maps/place/Castello+di+Pavone/@45.436078,7.8533246,575m/data=!3m3!1e3!4b1!5s0x4788845a95ad76bb:0x7871d6cd6d589392!4m9!3m8!1s0x4788845ab3c3efd1:0x24c65c6b9e1e3c26!5m2!4m1!1i2!8m2!3d45.4360743!4d7.8558995!16s%2Fg%2F121b75r7?authuser=0&entry=ttu&g_ep=EgoyMDI2MDMwOS4wIKXMDSoASAFQAw%3D%3D">
</iframe>

</section>

<section>

<h2>Conferma presenza</h2>

<p>
Facci sapere se potrai partecipare!
</p>

<button onclick="window.location.href='https://forms.gle/'">
RSVP
</button>

</section>

<footer>

Sara & Samuel – 2026 💍

</footer>

<script>

var weddingDate = new Date("Sep 11, 2026 17:00:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();

var distance = weddingDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));

var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

document.getElementById("countdown").innerHTML =
days + " giorni " + hours + " ore " + minutes + " minuti";

}, 1000);

</script>

</body>
</html>
